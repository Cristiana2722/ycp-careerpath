<!DOCTYPE html>
<html lang="ro">
  <body>
    <!-- Static form registration for Netlify build-time detection. -->
    <!-- This file is never shown to users. -->

    <!-- Contact form -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="career" />
      <textarea name="message"></textarea>
    </form>

    <!-- Satisfaction questionnaire -->
    <form name="chestionar" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="text" name="rating" />
      <textarea name="liked"></textarea>
      <textarea name="improve"></textarea>
      <input type="text" name="recommend" />
    </form>
  </body>
</html>
